name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # m/v waterline G1 gate — v-stdlib is layer v (passes trivially: v -> m is
  # allowed).
  arch:
    uses: vista-cloud-dev/.github/.github/workflows/arch-waterline.yml@main

  # VSL T0b.3/T0b.4 — the registry-driven drift gates + the cross-repo MSL
  # seam-contract pin. Pure-Python (system python3), engine-free: engine-targets
  # is empty so m-ci.yml skips the engine container. check-msl-pin SKIPs green in
  # CI (the sibling m-stdlib is not checked out here → MSL unreachable). The
  # engine-bound suites run in the dedicated jobs below (the reusable m-ci.yml
  # starts only one engine and has no MinIO, so it can't host the round-trip).
  ci:
    uses: vista-cloud-dev/.github/.github/workflows/m-ci.yml@main
    with:
      engine-free-targets: "check-seams check-icr check-citations check-namespaces check-msl-pin check-engine-access manifest-check manifest-golden skill-check docs-bodies-check frontmatter-check examples-check examples-coverage"
      engine-targets: ""

  # ── Engine-bound HARD gate (YDB) ────────────────────────────────────────────
  # The bare-engine-green suite set + the bare living-examples arm on a live YDB
  # engine. Self-contained: the reusable m-ci.yml can't host a sibling-MSL
  # checkout + engine, so this job provisions them (mirroring m-ci.yml's build-`m`
  # / start-engine steps).
  # NOTE: the prior S3 round-trip (VSLS3E2ETST + MinIO testbed) was quarantined
  # with the rest of the prior tap subsystem (see quarantine/).
  engine-ydb:
    runs-on: ubuntu-latest
    env:
      M: m
    steps:
      - uses: actions/checkout@v4

      - name: Clone m-cli + read its Go pin
        id: mcli
        run: |
          git clone --depth 1 --branch main \
            https://github.com/vista-cloud-dev/m-cli "$RUNNER_TEMP/m-cli"
          echo "go-version=$(cat "$RUNNER_TEMP/m-cli/.go-version")" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.mcli.outputs.go-version }}
          check-latest: true

      - name: Build the Go `m` toolchain from m-cli
        run: |
          ( cd "$RUNNER_TEMP/m-cli" && CGO_ENABLED=0 go build -trimpath -o "$RUNNER_TEMP/m" . )
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/m" version || true

      - name: Check out m-stdlib (STD* routines staged via --routines)
        run: |
          git clone --depth 1 --branch main \
            https://github.com/vista-cloud-dev/m-stdlib "$RUNNER_TEMP/m-stdlib"
          echo "MSTDLIB=$RUNNER_TEMP/m-stdlib" >> "$GITHUB_ENV"

      - name: Start the YDB engine (m-test-engine 0.2.0)
        run: |
          docker run -d --name m-test-engine ghcr.io/m-dev-tools/m-test-engine:0.2.0
          echo "waiting for m-test-engine to report healthy…"
          for _ in $(seq 1 60); do
            s="$(docker inspect -f '{{.State.Health.Status}}' m-test-engine 2>/dev/null || echo starting)"
            echo "  health: $s"; [ "$s" = healthy ] && break; sleep 2
          done
          test "$(docker inspect -f '{{.State.Health.Status}}' m-test-engine)" = healthy

      - name: Bare-engine suites (YDB)
        run: make test-bare ENGINE=ydb DOCKER=m-test-engine

      - name: Living examples — bare YDB arm (E4, hard gate)
        # Executes examples/programs/*EX.m on m-test-engine via the driver stack,
        # by @exrun scope (dual + ydb; @exrun live modules skipped on bare).
        run: make examples-run-ydb

      - name: Tear down
        if: always()
        run: |
          docker rm -f m-test-engine || true

  # ── Engine-bound FAIL-SOFT gate (IRIS, PRs only) ─────────────────────────────
  # Surfaces IRIS portability of the bare suites without blocking a merge (org
  # posture: IRIS is best-effort in CI — the iris-portability job in m-ci.yml is
  # also continue-on-error). A fresh iris-community is NOT the curated local
  # m-test-iris, so a red run here is informative, not a gate.
  engine-iris:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      M: m
    steps:
      - uses: actions/checkout@v4

      - name: Clone m-cli + read its Go pin
        id: mcli
        run: |
          git clone --depth 1 --branch main \
            https://github.com/vista-cloud-dev/m-cli "$RUNNER_TEMP/m-cli"
          echo "go-version=$(cat "$RUNNER_TEMP/m-cli/.go-version")" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.mcli.outputs.go-version }}
          check-latest: true

      - name: Build the Go `m` toolchain from m-cli
        run: |
          ( cd "$RUNNER_TEMP/m-cli" && CGO_ENABLED=0 go build -trimpath -o "$RUNNER_TEMP/m" . )
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Check out m-stdlib (STD* routines staged via --routines)
        run: |
          git clone --depth 1 --branch main \
            https://github.com/vista-cloud-dev/m-stdlib "$RUNNER_TEMP/m-stdlib"
          echo "MSTDLIB=$RUNNER_TEMP/m-stdlib" >> "$GITHUB_ENV"

      - name: Start the IRIS engine (community)
        run: |
          docker run -d --name m-test-iris intersystemsdc/iris-community:latest
          echo "waiting for m-test-iris to report healthy…"
          for _ in $(seq 1 90); do
            s="$(docker inspect -f '{{.State.Health.Status}}' m-test-iris 2>/dev/null || echo starting)"
            echo "  health: $s"; [ "$s" = healthy ] && break; sleep 2
          done
          docker inspect -f '{{.State.Health.Status}}' m-test-iris

      - name: Bare-engine suites (IRIS)
        run: make test-bare ENGINE_FLAGS='--engine iris --docker m-test-iris --chset m --namespace USER'

      - name: Living examples — bare IRIS arm (E4, fail-soft)
        # Executes the dual-scope examples on m-test-iris via the driver stack.
        # This job is continue-on-error (org IRIS posture), so a red surfaces
        # softly. @exrun live modules are skipped here.
        run: make examples-run-iris

      - name: Tear down
        if: always()
        run: |
          docker rm -f m-test-iris || true
